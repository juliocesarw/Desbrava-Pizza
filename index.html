<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pedido de Pizza</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f4f4;
}

.card{
max-width:500px;
margin:auto;
margin-top:30px;
margin-bottom:30px;
}

.valor{
font-size:22px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-3">🍕 Pedido de Pizza</h3>

<form id="form">

<label class="form-label">Unidade</label>

<select class="form-select" name="unidade" required>

<option value="" selected disabled>Selecionar unidade</option>

<option>Pégasus</option>
<option>Escorpião</option>
<option>Hércules</option>
<option>Órion</option>
<option>Ursa Menor</option>
<option>Ursa Maior</option>
<option>Phoenix</option>

</select>

<label class="form-label mt-3">Nome do Cliente</label>

<input class="form-control" type="text" name="nome" required>

<label class="form-label mt-3">Endereço</label>

<input class="form-control" type="text" name="endereco" required>

<h5 class="mt-4">Sabores</h5>

<div class="row mt-2">

<div class="col-8">Marguerita</div>
<div class="col-4">
<input class="form-control" type="number" name="marguerita" value="0" min="0">
</div>

<div class="col-8 mt-2">3 Queijos</div>
<div class="col-4 mt-2">
<input class="form-control" type="number" name="tresQueijos" value="0" min="0">
</div>

<div class="col-8 mt-2">Frango</div>
<div class="col-4 mt-2">
<input class="form-control" type="number" name="frango" value="0" min="0">
</div>

<div class="col-8 mt-2">Chocolate</div>
<div class="col-4 mt-2">
<input class="form-control" type="number" name="chocolate" value="0" min="0">
</div>

</div>

<div class="valor mt-3">

Total: <span id="valor">R$ 0</span>

</div>

<hr>

<h5>Pagamento via PIX</h5>

Chave PIX (CPF): <b>00820178756</b><br>
Nome: <b>Anderson Antônio</b><br><br>

Após realizar o pagamento, envie o comprovante para o WhatsApp:

<br><br>

<a class="btn btn-success w-100 mb-3"
href="https://wa.me/5527995067595?text=Olá!%20Segue%20meu%20comprovante%20do%20pedido%20de%20pizza."
target="_blank">

Enviar comprovante no WhatsApp

</a>

<div class="form-check mb-3">

<input class="form-check-input" type="checkbox" id="checkPagamento">

<label class="form-check-label">
Já paguei e enviei o comprovante
</label>

</div>

<button class="btn btn-danger w-100"
type="submit"
id="btnEnviar">

Enviar Pedido

</button>

</form>

</div>
</div>
</div>

<script>

const preco = 45;

const campos = ["marguerita","tresQueijos","frango","chocolate"];

function calcular(){

let total = 0;

campos.forEach(c=>{
total += Number(document.querySelector(`[name=${c}]`).value);
});

document.getElementById("valor").innerText =
"R$ " + (total * preco);

return total;

}

campos.forEach(c=>{
document.querySelector(`[name=${c}]`)
.addEventListener("input",calcular);
});

const form = document.getElementById("form");
const checkPagamento = document.getElementById("checkPagamento");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

/* verifica checkbox */

if(!checkPagamento.checked){

alert("Você precisa marcar que já pagou e enviou o comprovante!");

return;

}

let total = calcular();

/* impede pedido vazio */

if(total == 0){

alert("Você precisa pedir pelo menos 1 pizza!");

return;

}

const dados = {

unidade: form.unidade.value,
nome: form.nome.value,
endereco: form.endereco.value,
marguerita: form.marguerita.value,
tresQueijos: form.tresQueijos.value,
frango: form.frango.value,
chocolate: form.chocolate.value

};

await fetch("https://script.google.com/macros/s/AKfycbwdo09Yy9EJeNJUqBOnV6XCo8vL0Fx7bw8cJJaaqHzIlCFluiQC3_hug7Tw847l23Qd/exec",{

method:"POST",
body:JSON.stringify(dados)

});

alert("Pedido enviado com sucesso!");

form.reset();

document.getElementById("valor").innerText = "R$ 0";

checkPagamento.checked = false;

});

</script>

</body>

</html>
