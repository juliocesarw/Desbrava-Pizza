<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pedido de Pizza</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f4f4;
}

.card{
max-width:500px;
margin:auto;
margin-top:30px;
margin-bottom:30px;
}

.preco{
font-weight:bold;
color:#198754;
}

.qtd-box{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.contador{
font-size:18px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.animar{
transform:scale(1.2);
transition:0.2s;
}

.total-box{
background:#e9f9ee;
border:2px solid #198754;
border-radius:10px;
padding:12px;
text-align:center;
margin-top:25px;
margin-bottom: 20px;
}

.total-sub{
font-size:18px;
font-weight:bold;
}

.total-valor{
font-size:34px;
font-weight:bold;
color:#198754;
transition:0.2s;
}

.animar-total{
transform:scale(1.15);
}

.taxa-box{
background:#fff0f0;
border:1px solid #dc3545;
border-radius:6px;
padding:6px;
margin-top:5px;
font-size:14px;
text-align:center;
}

.taxa{
color:#dc3545;
font-weight:bold;
}

/* Estilos para a caixa do PIX e animação do botão */
.pix-box {
background: #f8f9fa;
border: 1px dashed #6c757d;
border-radius: 8px;
padding: 15px;
text-align: center;
}

.btn-copiar {
transition: all 0.3s ease;
}

.btn-copiado {
background-color: #198754 !important;
color: white !important;
border-color: #198754 !important;
transform: scale(1.05);
}

.btn-enviar{
font-weight:bold;
transition:0.2s;
}

.btn-enviar:active{
transform:scale(0.96);
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-2">🍕 Pedido de Pizza</h3>

<div class="contador">
Pizzas no pedido: <span id="contador">0</span>
</div>

<form id="form">

<label class="form-label">Unidade</label>

<select class="form-select" name="unidade" required>
<option value="" selected disabled>Selecionar unidade que indicou</option>
<option>Pégasus</option>
<option>Escorpião</option>
<option>Hércules</option>
<option>Órion</option>
<option>Ursa Menor</option>
<option>Ursa Maior</option>
<option>Phoenix</option>
<option>Não tenho unidade</option>
</select>

<label class="form-label mt-3">Nome do Cliente</label>
<input class="form-control" type="text" name="nome" required>

<label class="form-label mt-3">Você é do bairro?</label>

<select class="form-select" name="bairro" id="bairro" required onchange="calcular()">
<option value="" selected disabled>Selecionar</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>

<label class="form-label mt-3">Endereço</label>
<input class="form-control" type="text" name="endereco" required>

<label class="form-label mt-3">Ponto de Referência</label>
<input class="form-control" type="text" name="referencia">

<h5 class="mt-4">Sabores</h5>

<div id="sabores"></div>

<hr class="mt-4">

<h5>Resumo do Pedido</h5>

<div id="resumo" class="text-muted">
Nenhuma pizza selecionada
</div>

<label class="form-label mt-3">Observações</label>
<textarea class="form-control" name="observacoes" placeholder="Ex: Tocar o interfone..."></textarea>

<div class="total-box">

<div>Subtotal pizzas</div>
<div class="total-sub" id="subtotal">R$ 0</div>

<div class="taxa-box" id="taxaBox" style="display:none">
🚚 Taxa de entrega: <span class="taxa">R$5</span>
</div>

<hr>

<div>Total do pedido</div>
<div class="total-valor" id="valor">R$ 0</div>

</div>

<div class="pix-box mb-3">
    <h6 class="mb-1 text-success fw-bold">Pague com PIX</h6>
    <div class="text-muted small mb-2">Nome: Bernardo Vieira Simões</div>
    
    <div class="d-flex justify-content-center align-items-center gap-2">
        <span class="fw-bold fs-5" id="chavePix">138.799.307-08</span>
        <button type="button" class="btn btn-sm btn-outline-secondary btn-copiar" id="btnCopiarPix" onclick="copiarPix()">Copiar</button>
    </div>
</div>

<a class="btn btn-success w-100 mb-3"
id="btnWhatsapp"
href="#"
target="_blank">
Enviar comprovante no WhatsApp
</a>

<div class="form-check mb-3">

<input class="form-check-input" type="checkbox" id="confirmarPagamento">

<label class="form-check-label">
Já paguei e enviei o comprovante pelo WhatsApp.
</label>

</div>

<button class="btn btn-danger w-100 btn-enviar d-flex justify-content-center align-items-center gap-2"
type="submit"
id="btnEnviar">

<span id="loadingSpinner" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display:none;"></span>

<span id="textoBotao">Enviar Pedido</span>

</button>

</form>

</div>
</div>
</div>

<script>

const preco = 45;
const taxaEntrega = 5;

const nomes = {
marguerita:"Marguerita",
tresQueijos:"3 Queijos",
frango:"Frango",
chocolate:"Chocolate"
};

const pizzas = {
marguerita:0,
tresQueijos:0,
frango:0,
chocolate:0
};

const container = document.getElementById("sabores");

for(let p in nomes){

container.innerHTML += `

<div class="row mt-3">

<div class="col-6">
${nomes[p]}<br>
<span class="preco">R$45</span>
</div>

<div class="col-6">

<div class="qtd-box">

<button type="button" class="btn btn-outline-secondary btn-sm" onclick="alterar('${p}',-1)">-</button>

<span id="${p}">0</span>

<button type="button" class="btn btn-outline-secondary btn-sm" onclick="alterar('${p}',1)">+</button>

</div>

</div>

</div>

`;

}

function alterar(sabor,valor){

pizzas[sabor]+=valor;

if(pizzas[sabor]<0) pizzas[sabor]=0;

const el = document.getElementById(sabor);

el.innerText = pizzas[sabor];

el.classList.add("animar");

setTimeout(()=>el.classList.remove("animar"),200);

calcular();

}

function calcular(){

let totalPizzas=0;
let resumo="";

for(let p in pizzas){

if(pizzas[p]>0){
resumo+=`${nomes[p]} x${pizzas[p]}<br>`;
}

totalPizzas+=pizzas[p];

}

let subtotal = totalPizzas * preco;

let taxa = 0;

if(document.getElementById("bairro").value==="nao"){
taxa = taxaEntrega;
document.getElementById("taxaBox").style.display="block";
resumo+=`Taxa de entrega: R$5<br>`;
}else{
document.getElementById("taxaBox").style.display="none";
}

let totalFinal = subtotal + taxa;

document.getElementById("contador").innerText = totalPizzas;

document.getElementById("subtotal").innerText="R$ "+subtotal;

let totalEl = document.getElementById("valor");

totalEl.innerText="R$ "+totalFinal;

totalEl.classList.add("animar-total");

setTimeout(()=>totalEl.classList.remove("animar-total"),200);

document.getElementById("resumo").innerHTML = resumo || "Nenhuma pizza selecionada";

return totalFinal;

}

// FUNÇÃO PARA COPIAR A CHAVE PIX
function copiarPix() {
    const chave = "138.799.307-08";
    navigator.clipboard.writeText(chave).then(() => {
        const btn = document.getElementById("btnCopiarPix");
        btn.innerText = "Copiado!";
        btn.classList.add("btn-copiado");
        
        // Remove a animação e volta ao texto normal após 2 segundos
        setTimeout(() => {
            btn.innerText = "Copiar";
            btn.classList.remove("btn-copiado");
        }, 2000);
    });
}

function gerarMensagemWhatsapp(){

let total = calcular();

let mensagem = "🍕 PEDIDO DE PIZZA%0A%0A";

mensagem+="Unidade: "+form.unidade.value+"%0A";
mensagem+="Cliente: "+form.nome.value+"%0A";
mensagem+="Endereço: "+form.endereco.value+"%0A";

mensagem+="%0APedido:%0A";

for(let p in pizzas){
if(pizzas[p]>0){
mensagem+=`${nomes[p]} x${pizzas[p]}%0A`;
}
}

if(form.bairro.value==="nao"){
mensagem+="Taxa de entrega: R$5%0A";
}

mensagem+=`%0ATotal: R$ ${total}`;

return "https://wa.me/5527988715056?text="+mensagem;

}

const form = document.getElementById("form");

// Adicionado evento de validação antes de ir para o WhatsApp
document.getElementById("btnWhatsapp").addEventListener("click",function(e){
    
    // Validação 1: Verificar se existe pelo menos uma pizza
    let totalPizzas = pizzas.marguerita + pizzas.tresQueijos + pizzas.frango + pizzas.chocolate;
    
    if(totalPizzas === 0) {
        e.preventDefault(); // Impede de abrir o link do WhatsApp
        alert("Selecione pelo menos uma pizza antes de enviar o comprovante!");
        return;
    }

    this.href = gerarMensagemWhatsapp();
});

form.addEventListener("submit", async (e)=>{

e.preventDefault();

// Validação 1: Verificar se existe pelo menos uma pizza antes de enviar o formulário
let totalPizzas = pizzas.marguerita + pizzas.tresQueijos + pizzas.frango + pizzas.chocolate;

if(totalPizzas === 0) {
    alert("Selecione pelo menos uma pizza para fazer o pedido!");
    return;
}

if(!document.getElementById("confirmarPagamento").checked){

alert("Confirme que enviou o comprovante.");

return;

}

const btn = document.getElementById("btnEnviar");

btn.disabled = true;

document.getElementById("textoBotao").innerText="Enviando pedido...";
document.getElementById("loadingSpinner").style.display="inline-block";

// Captura do total, subtotal e taxa para enviar ao Google Sheets
let totalFinalCalculado = calcular();
let valorTaxaAplicada = form.bairro.value === "nao" ? taxaEntrega : 0;
let subtotalPizzas = totalFinalCalculado - valorTaxaAplicada;

const dados = {

unidade: form.unidade.value,
nome: form.nome.value,
bairro: form.bairro.value,
endereco: form.endereco.value,
referencia: form.referencia.value,
observacoes: form.observacoes.value,
marguerita: pizzas.marguerita,
tresQueijos: pizzas.tresQueijos,
frango: pizzas.frango,
chocolate: pizzas.chocolate,
subtotal: subtotalPizzas, 
taxa: valorTaxaAplicada,  
total: totalFinalCalculado 

};

await fetch("https://script.google.com/macros/s/AKfycbwdo09Yy9EJeNJUqBOnV6XCo8vL0Fx7bw8cJJaaqHzIlCFluiQC3_hug7Tw847l23Qd/exec",{
method:"POST",
body:JSON.stringify(dados)
});

alert("Pedido enviado com sucesso!");

location.reload();

});

</script>

</body>
</html>
